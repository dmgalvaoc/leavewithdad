<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Submissions — Admin | Leave With Dad</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="/style.css" />

  <style>
    body { background: var(--parchment); }

    .admin-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .admin-header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--green);
    }
    .admin-header h1 em { color: var(--terra); font-style: italic; }

    .admin-tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e0dbd0;
      padding-bottom: 0;
    }
    .admin-tab {
      background: none;
      border: none;
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s;
    }
    .admin-tab.active { color: var(--green); border-bottom-color: var(--green); }
    .admin-tab .badge {
      display: inline-block;
      background: var(--terra);
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.7rem;
      margin-left: 5px;
    }

    .submission-card {
      background: #fff;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 12px;
    }
    .submission-card .sc-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a2a22;
      margin-bottom: 6px;
    }
    .submission-card .sc-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .sc-meta span { display: flex; align-items: center; gap: 3px; }
    .submission-card .sc-desc {
      font-size: 0.83rem;
      color: #555;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .submission-card .sc-submitter {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .sc-actions { display: flex; gap: 8px; }
    .btn-approve, .btn-reject {
      padding: 6px 18px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-reject  { background: #f5ebe8; color: var(--terra); border: 1.5px solid var(--terra); }
    .btn-approve:hover { opacity: .85; }
    .btn-reject:hover  { background: #fde0d5; }
    .btn-approve:disabled,
    .btn-reject:disabled { opacity: .4; cursor: default; }

    .status-badge {
      display: inline-block;
      border-radius: 10px;
      padding: 2px 9px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .status-pending  { background: #fff8e0; color: #8a6200; }
    .status-approved { background: #e8f4ee; color: var(--green); }
    .status-rejected { background: #fdf0ee; color: #a0392b; }

    .admin-empty {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
    }
    .admin-empty .ti { font-size: 2rem; display: block; margin-bottom: 10px; }

    .admin-signin {
      text-align: center;
      padding: 60px 0;
    }
    .admin-signin h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.3rem;
      color: var(--green);
      margin-bottom: 8px;
    }
    .admin-signin p { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; }
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      background: #fff;
    }
    .user-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.83rem;
      color: #555;
    }
    .signout-link { background: none; border: none; color: var(--terra); font-size: 0.78rem; cursor: pointer; text-decoration: underline; }

    @media (max-width: 600px) {
      .admin-wrap { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="/" class="logo">leave with <span>dad</span></a>
    <div class="topbar-right">
      <div id="user-bar-placeholder"></div>
    </div>
  </header>

  <nav class="nav" aria-label="Main navigation">
    <ul>
      <li><a href="/#plantation"><i class="ti ti-building-community"></i> Plantation</a></li>
      <li><a href="/#home"><i class="ti ti-home-2"></i> Home</a></li>
      <li><a href="/#yard"><i class="ti ti-leaf"></i> Yard &amp; Garden</a></li>
      <li><a href="/events/"><i class="ti ti-calendar-event"></i> Events</a></li>
      <li><a href="/#recommends"><i class="ti ti-star"></i> Dad Recommends</a></li>
    </ul>
  </nav>

  <div class="admin-wrap">
    <div class="admin-header">
      <h1>Event <em>Submissions</em></h1>
      <div id="admin-user-row"></div>
    </div>
    <div id="admin-body">
      <p style="color:var(--muted);font-size:.88rem">Loading…</p>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const SUPA_URL    = 'https://soarurpqwyqxejvkuumi.supabase.co';
    const SUPA_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvYXJ1cnBxd3lxeGVqdmt1dW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjI5NzUsImV4cCI6MjA5NjU5ODk3NX0.D2xSyarj32HFOLjT8hWbQm0QGFQSOk8-Jo7oGHi4Cog';
    const ADMIN_EMAIL = 'diegomgalvaoc@gmail.com';
    const sb = window.supabase.createClient(SUPA_URL, SUPA_ANON);

    let currentUser = null;
    let submissions = [];
    let activeTab   = 'pending';

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Auth ──────────────────────────────────────────────────────
    function renderUserRow() {
      const el = document.getElementById('admin-user-row');
      if (!currentUser) {
        el.innerHTML = '';
        return;
      }
      const meta = currentUser.user_metadata || {};
      const name = meta.full_name || meta.name || currentUser.email;
      el.innerHTML = `
        <div class="user-bar">
          <i class="ti ti-user-check" style="color:var(--green)"></i>
          <span>${escHtml(name)}</span>
          <button class="signout-link" id="signout-btn">Sign out</button>
        </div>`;
      el.querySelector('#signout-btn').addEventListener('click', async () => {
        await sb.auth.signOut();
        currentUser = null;
        renderAdmin();
      });
    }

    function renderSignIn() {
      document.getElementById('admin-body').innerHTML = `
        <div class="admin-signin">
          <h2>Admin Access</h2>
          <p>Sign in with your admin Google account to manage event submissions.</p>
          <button class="btn-google" id="google-signin">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Sign in with Google
          </button>
        </div>`;
      document.getElementById('google-signin').addEventListener('click', () => {
        sb.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.href },
        });
      });
    }

    function renderNotAdmin() {
      document.getElementById('admin-body').innerHTML = `
        <div class="admin-signin">
          <h2>Access Denied</h2>
          <p>This page is only accessible to the site admin.</p>
          <button class="signout-link" style="font-size:.9rem;padding:8px 16px;border:1.5px solid var(--terra);border-radius:6px" id="wrong-signout">Sign out</button>
        </div>`;
      document.getElementById('wrong-signout').addEventListener('click', async () => {
        await sb.auth.signOut();
        currentUser = null;
        renderAdmin();
      });
    }

    // ── Load submissions ──────────────────────────────────────────
    async function loadSubmissions() {
      const { data } = await sb
        .from('community_events')
        .select('*')
        .order('created_at', { ascending: false });
      submissions = data || [];
    }

    // ── Approve / Reject ──────────────────────────────────────────
    async function setStatus(id, status) {
      await sb.from('community_events').update({ status }).eq('id', id);
      const ev = submissions.find(s => s.id === id);
      if (ev) ev.status = status;
      renderSubmissions();
    }

    // ── Render submissions ────────────────────────────────────────
    function renderSubmissions() {
      const body = document.getElementById('admin-body');
      const pending  = submissions.filter(s => s.status === 'pending');
      const approved = submissions.filter(s => s.status === 'approved');
      const rejected = submissions.filter(s => s.status === 'rejected');

      const counts = { pending: pending.length, approved: approved.length, rejected: rejected.length };
      const list   = activeTab === 'pending' ? pending : activeTab === 'approved' ? approved : rejected;

      body.innerHTML = `
        <div class="admin-tab-bar">
          <button class="admin-tab ${activeTab==='pending'?'active':''}" data-tab="pending">
            Pending ${counts.pending ? `<span class="badge">${counts.pending}</span>` : ''}
          </button>
          <button class="admin-tab ${activeTab==='approved'?'active':''}" data-tab="approved">Approved</button>
          <button class="admin-tab ${activeTab==='rejected'?'active':''}" data-tab="rejected">Rejected</button>
        </div>
        <div id="submissions-list"></div>`;

      body.querySelectorAll('.admin-tab').forEach(t => {
        t.addEventListener('click', () => { activeTab = t.dataset.tab; renderSubmissions(); });
      });

      const listEl = body.querySelector('#submissions-list');

      if (!list.length) {
        listEl.innerHTML = `<div class="admin-empty"><i class="ti ti-inbox"></i><p>No ${activeTab} submissions.</p></div>`;
        return;
      }

      for (const ev of list) {
        const card = document.createElement('div');
        card.className = 'submission-card';
        card.innerHTML = `
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
            <div class="sc-title">${escHtml(ev.title)}</div>
            <span class="status-badge status-${escHtml(ev.status)}">${escHtml(ev.status)}</span>
          </div>
          <div class="sc-meta">
            <span><i class="ti ti-calendar"></i> ${escHtml(ev.date)}</span>
            <span><i class="ti ti-map-pin"></i> ${escHtml(ev.city)}</span>
            ${ev.time ? `<span><i class="ti ti-clock"></i> ${escHtml(ev.time)}</span>` : ''}
            ${ev.link ? `<span><i class="ti ti-link"></i> <a href="${escHtml(ev.link)}" target="_blank" rel="noopener" style="color:var(--terra)">${escHtml(ev.link.replace(/^https?:\/\//,'').slice(0,40))}</a></span>` : ''}
          </div>
          ${ev.description ? `<div class="sc-desc">${escHtml(ev.description)}</div>` : ''}
          <div class="sc-submitter">
            Submitted by <strong>${escHtml(ev.submitter_name || 'Unknown')}</strong>
            ${ev.submitter_email ? `(${escHtml(ev.submitter_email)})` : ''}
            · ${new Date(ev.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
          </div>
          <div class="sc-actions">
            ${ev.status !== 'approved' ? `<button class="btn-approve" data-id="${ev.id}" data-action="approved">✓ Approve</button>` : ''}
            ${ev.status !== 'rejected' ? `<button class="btn-reject"  data-id="${ev.id}" data-action="rejected">✗ Reject</button>`  : ''}
          </div>`;

        card.querySelectorAll('[data-action]').forEach(btn => {
          btn.addEventListener('click', async () => {
            btn.disabled = true;
            await setStatus(btn.dataset.id, btn.dataset.action);
          });
        });

        listEl.appendChild(card);
      }
    }

    // ── Main render ───────────────────────────────────────────────
    async function renderAdmin() {
      renderUserRow();
      if (!currentUser) { renderSignIn(); return; }
      if (currentUser.email !== ADMIN_EMAIL) { renderNotAdmin(); return; }
      document.getElementById('admin-body').innerHTML = '<p style="color:var(--muted);font-size:.88rem">Loading submissions…</p>';
      await loadSubmissions();
      renderSubmissions();
    }

    // ── Auth state ────────────────────────────────────────────────
    sb.auth.getSession().then(({ data }) => {
      currentUser = data?.session?.user || null;
      renderAdmin();
    });
    sb.auth.onAuthStateChange((_event, session) => {
      currentUser = session?.user || null;
      renderAdmin();
    });

  })();
  </script>

</body>
</html>
