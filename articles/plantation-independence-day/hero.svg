<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" width="1400" height="600">
  <defs>
    <!-- Night sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="60%" stop-color="#1a1f4a"/>
      <stop offset="100%" stop-color="#2d1f5e"/>
    </linearGradient>
    <!-- Ground gradient -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#0d1a0d"/>
    </linearGradient>
    <!-- Crowd gradient -->
    <linearGradient id="crowd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2d1e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a140a"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-white">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tree-shadow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1400" height="600" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.7">
    <circle cx="80" cy="40" r="1.2"/><circle cx="150" cy="80" r="0.8"/><circle cx="220" cy="30" r="1"/><circle cx="300" cy="60" r="1.2"/>
    <circle cx="400" cy="25" r="0.8"/><circle cx="500" cy="50" r="1"/><circle cx="580" cy="35" r="1.2"/><circle cx="650" cy="70" r="0.8"/>
    <circle cx="730" cy="20" r="1"/><circle cx="820" cy="55" r="1.2"/><circle cx="900" cy="30" r="0.8"/><circle cx="980" cy="65" r="1"/>
    <circle cx="1060" cy="40" r="1.2"/><circle cx="1130" cy="25" r="0.8"/><circle cx="1200" cy="55" r="1"/><circle cx="1280" cy="35" r="1.2"/>
    <circle cx="1350" cy="70" r="0.8"/><circle cx="120" cy="110" r="0.8"/><circle cx="260" cy="100" r="1"/><circle cx="380" cy="90" r="0.8"/>
    <circle cx="460" cy="115" r="1.2"/><circle cx="560" cy="95" r="0.8"/><circle cx="680" cy="105" r="1"/><circle cx="780" cy="85" r="1.2"/>
    <circle cx="860" cy="120" r="0.8"/><circle cx="950" cy="95" r="1"/><circle cx="1040" cy="110" r="0.8"/><circle cx="1160" cy="90" r="1.2"/>
    <circle cx="1240" cy="115" r="1"/><circle cx="1320" cy="100" r="0.8"/>
  </g>

  <!-- Smoke trails (light wisps) -->
  <g opacity="0.15" fill="none" stroke="#aab0cc" stroke-width="1.5">
    <path d="M700,420 Q695,380 700,300"/>
    <path d="M450,380 Q445,340 450,280"/>
    <path d="M950,400 Q948,360 952,290"/>
    <path d="M250,420 Q248,390 252,350"/>
    <path d="M1150,410 Q1148,375 1152,330"/>
  </g>

  <!-- MAIN FIREWORK — center, large gold burst -->
  <g transform="translate(700, 260)" filter="url(#glow-gold)">
    <!-- Burst lines -->
    <g stroke="#FFD700" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-110"/><line x1="0" y1="0" x2="110" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="110"/><line x1="0" y1="0" x2="-110" y2="0"/>
      <line x1="0" y1="0" x2="78" y2="-78"/><line x1="0" y1="0" x2="78" y2="78"/>
      <line x1="0" y1="0" x2="-78" y2="78"/><line x1="0" y1="0" x2="-78" y2="-78"/>
      <line x1="0" y1="0" x2="42" y2="-100"/><line x1="0" y1="0" x2="100" y2="-42"/>
      <line x1="0" y1="0" x2="100" y2="42"/><line x1="0" y1="0" x2="42" y2="100"/>
      <line x1="0" y1="0" x2="-42" y2="100"/><line x1="0" y1="0" x2="-100" y2="42"/>
      <line x1="0" y1="0" x2="-100" y2="-42"/><line x1="0" y1="0" x2="-42" y2="-100"/>
    </g>
    <!-- Sparkle dots at tips -->
    <g fill="#FFD700">
      <circle cx="0" cy="-110" r="3.5"/><circle cx="110" cy="0" r="3.5"/>
      <circle cx="0" cy="110" r="3.5"/><circle cx="-110" cy="0" r="3.5"/>
      <circle cx="78" cy="-78" r="3"/><circle cx="78" cy="78" r="3"/>
      <circle cx="-78" cy="78" r="3"/><circle cx="-78" cy="-78" r="3"/>
      <circle cx="42" cy="-100" r="2.5"/><circle cx="100" cy="-42" r="2.5"/>
      <circle cx="100" cy="42" r="2.5"/><circle cx="42" cy="100" r="2.5"/>
      <circle cx="-42" cy="100" r="2.5"/><circle cx="-100" cy="42" r="2.5"/>
      <circle cx="-100" cy="-42" r="2.5"/><circle cx="-42" cy="-100" r="2.5"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="#FFF8DC"/>
  </g>

  <!-- RED FIREWORK — left -->
  <g transform="translate(380, 200)" filter="url(#glow-red)">
    <g stroke="#FF3333" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-80"/><line x1="0" y1="0" x2="80" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="80"/><line x1="0" y1="0" x2="-80" y2="0"/>
      <line x1="0" y1="0" x2="57" y2="-57"/><line x1="0" y1="0" x2="57" y2="57"/>
      <line x1="0" y1="0" x2="-57" y2="57"/><line x1="0" y1="0" x2="-57" y2="-57"/>
      <line x1="0" y1="0" x2="30" y2="-75"/><line x1="0" y1="0" x2="75" y2="-30"/>
      <line x1="0" y1="0" x2="75" y2="30"/><line x1="0" y1="0" x2="-75" y2="-30"/>
    </g>
    <g fill="#FF6666">
      <circle cx="0" cy="-80" r="3"/><circle cx="80" cy="0" r="3"/>
      <circle cx="0" cy="80" r="3"/><circle cx="-80" cy="0" r="3"/>
      <circle cx="57" cy="-57" r="2.5"/><circle cx="-57" cy="-57" r="2.5"/>
      <circle cx="57" cy="57" r="2.5"/><circle cx="-57" cy="57" r="2.5"/>
    </g>
    <circle cx="0" cy="0" r="6" fill="#FFaaaa"/>
  </g>

  <!-- BLUE FIREWORK — right -->
  <g transform="translate(1020, 180)" filter="url(#glow-blue)">
    <g stroke="#4488FF" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-85"/><line x1="0" y1="0" x2="85" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="85"/><line x1="0" y1="0" x2="-85" y2="0"/>
      <line x1="0" y1="0" x2="60" y2="-60"/><line x1="0" y1="0" x2="60" y2="60"/>
      <line x1="0" y1="0" x2="-60" y2="60"/><line x1="0" y1="0" x2="-60" y2="-60"/>
      <line x1="0" y1="0" x2="32" y2="-79"/><line x1="0" y1="0" x2="79" y2="-32"/>
      <line x1="0" y1="0" x2="79" y2="32"/><line x1="0" y1="0" x2="-79" y2="-32"/>
    </g>
    <g fill="#88BBFF">
      <circle cx="0" cy="-85" r="3"/><circle cx="85" cy="0" r="3"/>
      <circle cx="0" cy="85" r="3"/><circle cx="-85" cy="0" r="3"/>
      <circle cx="60" cy="-60" r="2.5"/><circle cx="-60" cy="-60" r="2.5"/>
      <circle cx="60" cy="60" r="2.5"/><circle cx="-60" cy="60" r="2.5"/>
    </g>
    <circle cx="0" cy="0" r="6" fill="#aaccff"/>
  </g>

  <!-- Small white burst — far left -->
  <g transform="translate(200, 280)" filter="url(#glow-white)">
    <g stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
      <line x1="0" y1="0" x2="0" y2="-55"/><line x1="0" y1="0" x2="55" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="55"/><line x1="0" y1="0" x2="-55" y2="0"/>
      <line x1="0" y1="0" x2="39" y2="-39"/><line x1="0" y1="0" x2="39" y2="39"/>
      <line x1="0" y1="0" x2="-39" y2="39"/><line x1="0" y1="0" x2="-39" y2="-39"/>
    </g>
    <g fill="white" opacity="0.85">
      <circle cx="0" cy="-55" r="2"/><circle cx="55" cy="0" r="2"/>
      <circle cx="0" cy="55" r="2"/><circle cx="-55" cy="0" r="2"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="white"/>
  </g>

  <!-- Small red burst — far right -->
  <g transform="translate(1220, 230)" filter="url(#glow-red)">
    <g stroke="#FF4444" stroke-width="1.5" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-60"/><line x1="0" y1="0" x2="60" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="60"/><line x1="0" y1="0" x2="-60" y2="0"/>
      <line x1="0" y1="0" x2="42" y2="-42"/><line x1="0" y1="0" x2="42" y2="42"/>
      <line x1="0" y1="0" x2="-42" y2="42"/><line x1="0" y1="0" x2="-42" y2="-42"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="#FF8888"/>
  </g>

  <!-- Palm trees silhouettes -->
  <!-- Left palm 1 -->
  <g transform="translate(60, 500)">
    <rect x="-6" y="-180" width="12" height="180" fill="#0d1a0d" rx="4"/>
    <ellipse cx="0" cy="-180" rx="55" ry="18" fill="#0d1a0d" transform="rotate(-15)"/>
    <ellipse cx="0" cy="-180" rx="55" ry="18" fill="#0d1a0d" transform="rotate(20)"/>
    <ellipse cx="0" cy="-180" rx="55" ry="18" fill="#0d1a0d" transform="rotate(55)"/>
    <ellipse cx="0" cy="-180" rx="55" ry="18" fill="#0d1a0d" transform="rotate(-50)"/>
    <ellipse cx="0" cy="-180" rx="50" ry="16" fill="#0d1a0d" transform="rotate(90)"/>
  </g>
  <!-- Right palm -->
  <g transform="translate(1340, 490)">
    <rect x="-6" y="-170" width="12" height="170" fill="#0d1a0d" rx="4"/>
    <ellipse cx="0" cy="-170" rx="50" ry="17" fill="#0d1a0d" transform="rotate(10)"/>
    <ellipse cx="0" cy="-170" rx="50" ry="17" fill="#0d1a0d" transform="rotate(-25)"/>
    <ellipse cx="0" cy="-170" rx="50" ry="17" fill="#0d1a0d" transform="rotate(50)"/>
    <ellipse cx="0" cy="-170" rx="50" ry="17" fill="#0d1a0d" transform="rotate(-60)"/>
  </g>

  <!-- Ground / park area -->
  <rect x="0" y="500" width="1400" height="100" fill="url(#ground)"/>

  <!-- Crowd silhouette -->
  <g fill="#0d1a0d">
    <!-- Simple crowd bumps -->
    <ellipse cx="150" cy="503" rx="30" ry="18"/><ellipse cx="210" cy="500" rx="25" ry="15"/>
    <ellipse cx="270" cy="505" rx="28" ry="17"/><ellipse cx="330" cy="502" rx="26" ry="16"/>
    <ellipse cx="390" cy="504" rx="30" ry="18"/><ellipse cx="450" cy="501" rx="27" ry="15"/>
    <ellipse cx="510" cy="503" rx="28" ry="17"/><ellipse cx="570" cy="500" rx="25" ry="16"/>
    <ellipse cx="630" cy="505" rx="30" ry="18"/><ellipse cx="700" cy="502" rx="32" ry="17"/>
    <ellipse cx="760" cy="504" rx="28" ry="15"/><ellipse cx="820" cy="501" rx="30" ry="18"/>
    <ellipse cx="880" cy="503" rx="26" ry="16"/><ellipse cx="940" cy="500" rx="28" ry="17"/>
    <ellipse cx="1000" cy="505" rx="30" ry="18"/><ellipse cx="1060" cy="502" rx="25" ry="15"/>
    <ellipse cx="1120" cy="504" rx="28" ry="17"/><ellipse cx="1180" cy="501" rx="30" ry="16"/>
    <ellipse cx="1240" cy="503" rx="26" ry="18"/>
    <!-- Head-shoulder shapes for front row -->
    <ellipse cx="180" cy="516" rx="10" ry="12"/><ellipse cx="240" cy="513" rx="9" ry="11"/>
    <ellipse cx="310" cy="517" rx="10" ry="12"/><ellipse cx="370" cy="514" rx="9" ry="11"/>
    <ellipse cx="430" cy="516" rx="10" ry="12"/><ellipse cx="490" cy="513" rx="9" ry="11"/>
    <ellipse cx="550" cy="517" rx="10" ry="12"/><ellipse cx="620" cy="514" rx="9" ry="11"/>
    <ellipse cx="680" cy="516" rx="11" ry="13"/><ellipse cx="740" cy="513" rx="9" ry="11"/>
    <ellipse cx="800" cy="517" rx="10" ry="12"/><ellipse cx="860" cy="514" rx="9" ry="11"/>
    <ellipse cx="920" cy="516" rx="10" ry="12"/><ellipse cx="980" cy="513" rx="9" ry="11"/>
    <ellipse cx="1040" cy="517" rx="10" ry="12"/><ellipse cx="1100" cy="514" rx="9" ry="11"/>
    <ellipse cx="1160" cy="516" rx="10" ry="12"/><ellipse cx="1220" cy="513" rx="9" ry="11"/>
  </g>

  <!-- American flag accent — subtle, top right -->
  <g transform="translate(1310, 50)" opacity="0.6">
    <rect x="0" y="0" width="70" height="45" fill="#B22234"/>
    <rect x="0" y="6.4" width="70" height="6.4" fill="white"/>
    <rect x="0" y="12.9" width="70" height="6.4" fill="#B22234"/>
    <rect x="0" y="19.3" width="70" height="6.4" fill="white"/>
    <rect x="0" y="25.7" width="70" height="6.4" fill="#B22234"/>
    <rect x="0" y="32.1" width="70" height="6.4" fill="white"/>
    <rect x="0" y="38.6" width="70" height="6.4" fill="#B22234"/>
    <rect x="0" y="0" width="28" height="24" fill="#3C3B6E"/>
    <!-- Stars in canton -->
    <g fill="white" font-size="5">
      <circle cx="4" cy="4" r="1.5"/><circle cx="10" cy="4" r="1.5"/><circle cx="16" cy="4" r="1.5"/><circle cx="22" cy="4" r="1.5"/>
      <circle cx="7" cy="9" r="1.5"/><circle cx="13" cy="9" r="1.5"/><circle cx="19" cy="9" r="1.5"/>
      <circle cx="4" cy="14" r="1.5"/><circle cx="10" cy="14" r="1.5"/><circle cx="16" cy="14" r="1.5"/><circle cx="22" cy="14" r="1.5"/>
      <circle cx="7" cy="19" r="1.5"/><circle cx="13" cy="19" r="1.5"/><circle cx="19" cy="19" r="1.5"/>
    </g>
    <line x1="-2" y1="0" x2="-2" y2="65" stroke="#8B6914" stroke-width="2"/>
  </g>

  <!-- Text overlay -->
  <text x="700" y="455" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="white" opacity="0.92" letter-spacing="4">INDEPENDENCE DAY</text>
  <text x="700" y="488" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FFD700" opacity="0.9" letter-spacing="8">PLANTATION, FLORIDA · 2026</text>
</svg>
