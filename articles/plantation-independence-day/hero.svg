    <ellipse cx="669" cy="516" rx="12" ry="15"/><ellipse cx="732" cy="513" rx="10" ry="13"/>
    <ellipse cx="796" cy="517" rx="11" ry="14"/><ellipse cx="858" cy="514" rx="10" ry="13"/>
    <ellipse cx="920" cy="516" rx="11" ry="14"/><ellipse cx="983" cy="513" rx="10" ry="13"/>
