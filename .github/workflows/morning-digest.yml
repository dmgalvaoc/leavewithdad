name: Morning Stats Digest

on:
  schedule:
    - cron: '0 6 * * *'    # 2:00 AM EDT (UTC-4) — adjust to '0 7 * * *' in winter (EST)
  workflow_dispatch:         # allows manual trigger from GitHub Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run morning digest
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/morning_digest.py

      - name: Commit performance log
        run: |
          git config user.name "leavewithdad-bot"
          git config user.email "dad@leavewithdad.com"
          git add insights/performance-log.md
          git diff --staged --quiet || git commit -m "chore: performance log $(date +%Y-%m-%d)"
          git push
